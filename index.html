<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Custom Fortnite/UEFN map development studio — get a quote instantly." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap');
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth}
      body{font-family:'DM Sans',sans-serif;background:#060610;color:#eaeaf5}
      textarea,input,select{font-family:'DM Sans',sans-serif}
      @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
      .fu{animation:fadeUp .3s ease forwards}
      .fu2{animation:fadeUp .3s .08s ease both}
      .fu3{animation:fadeUp .3s .16s ease both}
      ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
    </style>
    <title>UEFN Studio — Custom Fortnite Maps & Game Modes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
