<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Blackline Studio — custom Fortnite/UEFN map development. Get a quote instantly." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap');
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{scroll-behavior:smooth}
      body{font-family:'DM Sans',sans-serif;background:#060610;color:#eaeaf5;overflow-x:hidden}
      textarea,input,select{font-family:'DM Sans',sans-serif}
      @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
      @keyframes glow{0%,100%{box-shadow:0 0 18px rgba(88,101,242,.25),0 0 40px rgba(0,212,255,.1)}50%{box-shadow:0 0 28px rgba(88,101,242,.45),0 0 60px rgba(0,212,255,.2)}}
      @keyframes orb{0%{transform:translate(0,0) scale(1);opacity:.12}25%{transform:translate(80px,-40px) scale(1.2);opacity:.16}50%{transform:translate(-40px,60px) scale(.9);opacity:.1}75%{transform:translate(60px,20px) scale(1.1);opacity:.14}100%{transform:translate(0,0) scale(1);opacity:.12}}
      @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
      @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
      .fu{animation:fadeUp .3s ease forwards}
      .fu2{animation:fadeUp .3s .08s ease both}
      .fu3{animation:fadeUp .3s .16s ease both}
      .glow-btn{animation:glow 2.5s ease-in-out infinite}
      ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
    </style>
    <title>Blackline Studio — Custom Fortnite Maps & Game Modes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
